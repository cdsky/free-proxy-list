name: 更新代理列表

permissions:
  contents: write
  actions: read
  pull-requests: write
  issues: write
  repository-projects: write

on:
  schedule:
    # 每天早上7点和晚上7点更新代理列表（北京时间）
    - cron: '0 23 * * *'  # 北京时间早上7点 (UTC 23:00)
    - cron: '0 11 * * *'  # 北京时间晚上7点 (UTC 11:00)
  workflow_dispatch:

jobs:
  update-proxies:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: 设置Python环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 抓取代理列表
        run: |
          echo "开始抓取代理列表..."
          python generate_proxy_list.py
          echo "抓取完成，检查文件是否生成..."
          if [ -f proxy.txt ]; then
            echo "proxy.txt 文件已生成"
            echo "文件内容预览："
            head -5 proxy.txt
            echo "代理数量："
            grep -v '^#' proxy.txt | sed '/^[[:space:]]*$/d' | wc -l
          else
            echo "proxy.txt 文件未生成"
            exit 1
          fi

      - name: 写入更新时间
        run: |
          {
            echo "# updated_at=$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            grep -v '^# updated_at=' proxy.txt || true
          } > proxy.tmp
          mv proxy.tmp proxy.txt
          echo "更新时间已写入 proxy.txt 第一行"
          head -5 proxy.txt

      - name: 提交更新
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git

          git add proxy.txt

          echo "待提交变更："
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "没有更改"
          else
            git commit -m "更新代理列表"
            git push origin main
          fi
