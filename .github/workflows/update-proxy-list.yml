name: Update Proxy List

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-proxy-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Show current files
        run: |
          pwd
          ls -lah
          git status --short

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Generate proxy list
        run: |
          python generate_proxy_list.py
          echo "---- after generate ----"
          ls -lah
          echo "proxy lines:"
          wc -l proxy.txt || true
          echo "proxy head:"
          head -20 proxy.txt || true
          echo "git status:"
          git status --short

      - name: Write update marker
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > last_update.txt
          cat last_update.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add proxy.txt last_update.txt

          echo "---- staged diff ----"
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update proxy list"
            git push
          fi
