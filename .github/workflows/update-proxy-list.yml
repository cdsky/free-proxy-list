name: Update Proxy List

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-proxy-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Generate proxy list
        run: python generate_proxy_list.py

      - name: Touch proxy.txt update marker
        run: |
          {
            echo "# updated_at=$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            grep -v '^# updated_at=' proxy.txt || true
          } > proxy.tmp
          mv proxy.tmp proxy.txt

      - name: Commit and push proxy.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add proxy.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update proxy list"
            git push
          fi
